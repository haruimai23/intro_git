name: Claude PR Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          prompt: |
            このPRのdescriptionに記載されているファイルをレビューしてください。
            descriptionの内容: ${{ github.event.pull_request.body }}
            ファイルをレビューして結果をPRにコメントしてください。
